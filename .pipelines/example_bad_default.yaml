pipeline:
  name: example_bad_default
  description: Pipeline that fails due to a bug in src/main.py

stages:
  - build
  - test

install-deps:
  stage: build
  image: python:3.11
  script:
    - pip install -r requirements.txt

compile:
  stage: build
  image: python:3.11
  needs: [install-deps]
  script:
    - python -m py_compile src/main.py

unit-tests:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pytest tests/